route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'clarion-ops-webhook'

receivers:
  - name: 'clarion-ops-webhook'
    webhook_configs:
      # In Docker, use the service name. For local dev, use host.docker.internal.
      - url: 'http://alert-service:8004/api/v1/webhooks/alertmanager'
        send_resolved: true
