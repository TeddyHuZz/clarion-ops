name: Auto Rollback

on:
  repository_dispatch:
    types: [trigger-rollback]

jobs:
  rollback:
    name: Rollback to Stable Commit
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the exact commit to roll back to
      # -----------------------------------------------------------------------
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.target_commit_hash }}

      # -----------------------------------------------------------------------
      # 2. Build
      # -----------------------------------------------------------------------
      - name: Build Docker Image
        run: |
          echo "🔨 Building rollback image from commit ${{ github.event.client_payload.target_commit_hash }}..."
          # docker build -t clarion-ops:${{ github.event.client_payload.target_commit_hash }} .

      # -----------------------------------------------------------------------
      # 3. Push
      # -----------------------------------------------------------------------
      - name: Push to Registry
        run: |
          echo "📦 Pushing image to registry..."
          # docker push clarion-ops:${{ github.event.client_payload.target_commit_hash }}

      # -----------------------------------------------------------------------
      # 4. Deploy
      # -----------------------------------------------------------------------
      - name: Update Kubernetes Manifest
        run: |
          echo "🚀 Updating Kubernetes manifests..."
          # kubectl set image deployment/clarion-ops clarion-ops=clarion-ops:${{ github.event.client_payload.target_commit_hash }}

      # -----------------------------------------------------------------------
      # 5. Notify Slack (always runs — reports success or failure)
      # -----------------------------------------------------------------------
      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          PAYLOAD=$(cat <<EOF
          {
            "text": "🔄 Auto Rollback: $STATUS",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Auto Rollback Deployment*\nStatus: *$STATUS*\nCommit: \`${{ github.event.client_payload.target_commit_hash }}\`"
                }
              }
            ]
          }
          EOF
          )
          curl -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
