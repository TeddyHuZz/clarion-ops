services:
  # 1. Metrics Source Configuration
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./metrics-service/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./metrics-service/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    networks:
      - clarion-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./metrics-service/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--log.level=debug'
    networks:
      - clarion-net

  mock-exporter:
    build:
      context: ./metrics-service
      dockerfile_inline: |
        FROM python:3.12-slim
        RUN pip install prometheus-client
        COPY tests/mock_metrics_exporter.py .
        CMD ["python", "mock_metrics_exporter.py"]
    container_name: mock-exporter
    ports:
      - "8000:8000"
    networks:
      - clarion-net

  # 2. Functional Microservices
  metrics-service:
    build:
      context: ./metrics-service
      dockerfile: Dockerfile
    container_name: metrics-service
    ports:
      - "8001:8001"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - LOG_LEVEL=debug
    depends_on:
      - prometheus
    networks:
      - clarion-net

  data-service:
    build:
      context: ./data-service
      dockerfile: Dockerfile
    container_name: data-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:secret@timescaledb:5432/guardian_data
      - INTERNAL_API_KEY=dev-internal-secret-key
    depends_on:
      - timescaledb
      - metrics-service
    networks:
      - clarion-net

  alert-service:
    build:
      context: ./alert-service
      dockerfile: Dockerfile
    container_name: alert-service
    ports:
      - "8004:8004"
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DATA_SERVICE_URL=http://data-service:8002
    depends_on:
      - data-service
    networks:
      - clarion-net

  deployment-service:
    build:
      context: ./deployment-service
      dockerfile: Dockerfile
    container_name: deployment-service
    ports:
      - "8003:8003"
    environment:
      - DATA_SERVICE_URL=http://data-service:8002/api/v1/deployments/
      - PORT=8003
    depends_on:
      - data-service
    networks:
      - clarion-net

  # 3. Persistence Layer
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=guardian_data
    ports:
      - "5432:5432"
    volumes:
      - ./data-service/sql/init_metrics.sql:/docker-entrypoint-initdb.d/init_metrics.sql
    networks:
      - clarion-net

networks:
  clarion-net:
    driver: bridge
